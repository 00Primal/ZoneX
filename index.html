<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZoneX | Operational</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <div class="background-wrapper">
        <div class="grid"></div>
        <div class="glow red-center"></div>
    </div>

    <nav class="navbar">
        <div class="nav-content">
            <div class="brand">
                <img src="https://raw.githubusercontent.com/Ar5urOfficial/ZoneX/refs/heads/main/icon.ico" alt="Logo">
                <span>ZONEX <small data-pl="OPERACYJNY" data-en="OPERATIONAL">OPERACYJNY</small></span>
            </div>
            <div class="nav-links">
                <a href="https://github.com/Ar5urOfficial" class="btn-nav" data-pl="PROFIL" data-en="PROFILE">PROFIL</a>
                <a href="https://github.com/Ar5urOfficial/ZoneX" class="btn-nav">GITHUB</a>
                <div class="lang-switch">
                    <span id="lang-pl" class="lang-btn">PL</span>
                    <span class="separator">|</span>
                    <span id="lang-en" class="lang-btn active">EN</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="hero">
        <div class="badge" data-pl="NAJCZĘŚCIEJ WYBIERANA BIBLIOTEKA" data-en="THE MOST PREFERRED LIBRARY">NAJCZĘŚCIEJ WYBIERANA BIBLIOTEKA</div>
        <h1 class="text-red">ZONEX</h1>
        <p class="description" 
           data-pl="Biblioteka gier internetowych. Stabilna. Szybka. Stworzona dla Ciebie." 
           data-en="Web gaming library. Stable. Fast. Built for you.">
           Biblioteka gier internetowych. Stabilna. Szybka. Stworzona dla Ciebie.
        </p>

        <div class="cta-group">
            <a href="./webgames/" class="btn-primary" data-pl="Otwórz Bibliotekę" data-en="Open Library">Otwórz Bibliotekę</a>
            <a href="https://github.com/Ar5urOfficial/ZoneX/releases" class="btn-secondary" data-pl="Pobierz Aplikację" data-en="Download Application">Pobierz Aplikację</a>
        </div>
    </main>

    <script src="main.js"></script>
</body>

</html>
