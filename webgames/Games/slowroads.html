<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slow Roads - ZONEX</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #000;
            /* Twoja wybrana tapeta */
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.7)), 
                url('https://images.unsplash.com/photo-1508739773434-c26b3d09e071?q=80&w=1170&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        /* Kontener Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 90%;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .glass-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        /* Status "Live" */
        .status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 25px;
            letter-spacing: 1.5px;
            border: 1px solid rgba(74, 222, 128, 0.2);
            text-transform: uppercase;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        h1 {
            color: #fff;
            font-size: 2.8rem;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        p {
            color: rgba(255, 255, 255, 0.65);
            margin-bottom: 35px;
            font-size: 1rem;
            line-height: 1.6;
            font-weight: 400;
        }

        /* Przycisk Launch */
        .play-button {
            display: block;
            width: 100%;
            padding: 20px;
            background: #fff;
            color: #000;
            text-decoration: none;
            border-radius: 18px;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .play-button:hover {
            background: #4ade80;
            color: #fff;
            transform: scale(1.03);
            box-shadow: 0 15px 30px rgba(74, 222, 128, 0.4);
        }

        .play-button:active {
            transform: scale(0.97);
        }

        /* Animacja pulsowania */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }

        /* Responsywność dla mniejszych ekranów w panelu */
        @media (max-height: 500px) {
            .glass-card { padding: 25px; }
            h1 { font-size: 1.8rem; }
            p { margin-bottom: 15px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="status">
            <div class="dot"></div>
            Serwer dostępny
        </div>
        <h1>Slow Roads</h1>
        <p>Przemierzaj nieskończone krajobrazy w najbardziej relaksującej grze przeglądarkowej ostatnich lat.</p>
        
        <button class="play-button" onclick="launchGame()">Uruchom grę</button>
    </div>

    <script>
        function launchGame() {
            // Otwiera w nowym oknie, by ominąć blokadę Iframe
            window.open('https://slowroads.io', '_blank');
        }
    </script>

</body>
</html>
